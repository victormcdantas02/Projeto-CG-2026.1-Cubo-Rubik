<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cubo Mágico 3D</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="menu">
    <h1>Cubo Mágico 3D</h1>
    <button id="btnU">Girar Face Superior</button>
    <button id="btnF">Girar Face Frontal</button>
    <button id="btnD">Girar Face Inferior</button>
    <button id="btnReset">Reiniciar</button>
    <button id="btnShuffle">Embaralhar</button>
    <p>Movimentos: <span id="moves">0</span></p>
    <p>Vitórias: <span id="wins">0</span></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script src="js/cubo.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
